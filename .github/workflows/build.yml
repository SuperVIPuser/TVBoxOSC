name: TVBoxOSC 构建

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取你 fork 的仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置构建环境
        run: |
          # 1. 创建 local.properties
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

          # 2. 配置通用签名（无需额外文件）
          echo "RELEASE_STORE_FILE=tvbox.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=tvbox" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=123456" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=123456" >> gradle.properties

          # 3. 授予 gradlew 执行权限（关键步骤）
          chmod +x gradlew

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 编译 Release 包
        run: |
          ./gradlew clean assembleRelease --no-build-cache

      - name: 上传成品 APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBoxOSC_Release
          path: app/build/outputs/apk/release/
          retention-days: 30
