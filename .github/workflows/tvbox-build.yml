name: TVBox一键构建

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取本仓库代码
        uses: actions/checkout@v4

      - name: 拉取源码并配置环境
        run: |
          # 改用自带gradlew的仓库
          git clone --depth 1 https://github.com/yjx1219/TVBox.git tvbox-src
          cd tvbox-src

          # 创建local.properties
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

          # 配置通用签名
          echo "RELEASE_STORE_FILE=tvbox.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=tvbox" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=123456" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=123456" >> gradle.properties

          # 赋予gradlew执行权限
          chmod +x gradlew

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 编译Release包
        working-directory: tvbox-src
        run: |
          ./gradlew clean assembleRelease --no-build-cache

      - name: 整理APK
        run: |
          mkdir -p output
          find ./tvbox-src -name "*release*.apk" -exec mv {} ./output/ \;

      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox成品APK
          path: output/
          retention-days: 30
