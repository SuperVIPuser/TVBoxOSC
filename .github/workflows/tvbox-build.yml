name: TVBox编译构建

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - user: q215613905
            name: TVBoxOS
            branch: main
            jdk: 17
          - user: takagen99
            name: Box
            branch: main
            jdk: 17

    steps:
      - name: 拉取本仓库代码
        uses: actions/checkout@v4

      - name: 拉取TVBox源码
        run: |
          git clone --depth 1 -b ${{ matrix.repo.branch }} https://github.com/${{ matrix.repo.user }}/${{ matrix.repo.name }} tvbox-src

      - name: 配置构建环境与修复依赖
        working-directory: tvbox-src
        run: |
          # 1. 创建并配置local.properties
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

          # 2. 替换所有失效镜像，改为稳定源
          sed -i 's|maven { url "https://maven.aliyun.com/repository/public" }||g' build.gradle
          sed -i 's|maven { url "https://maven.aliyun.com/nexus/content/repositories/public" }||g' build.gradle
          sed -i 's|maven { url "https://jitpack.io" }|maven { url "https://jitpack.io" credentials { username "dummy" password "dummy" } }|g' build.gradle

          # 3. 配置通用签名
          echo "RELEASE_STORE_FILE=tvbox.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=tvbox" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=123456" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=123456" >> gradle.properties

          # 4. 授予执行权限
          chmod +x gradlew

      - name: 配置JDK环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.repo.jdk }}
          distribution: temurin

      - name: 开始编译Release包
        working-directory: tvbox-src
        run: |
          ./gradlew clean assembleRelease --no-build-cache --stacktrace --info

      - name: 整理编译好的APK
        run: |
          mkdir -p output
          find ./tvbox-src -name "*release*.apk" -exec mv {} ./output/ \;

      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox成品APK-${{ matrix.repo.name }}
          path: output/
          retention-days: 30
