name: TVBox极简构建

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取本仓库代码
        uses: actions/checkout@v4

      - name: 拉取TVBox源码（只保留q215613905/TVBoxOS）
        run: |
          git clone --depth 1 https://github.com/q215613905/TVBoxOS tvbox-src

      - name: 配置基础构建环境
        working-directory: tvbox-src
        run: |
          # 创建local.properties，解决文件缺失问题
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

          # 配置通用签名（不修改任何文件）
          echo "RELEASE_STORE_FILE=tvbox.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=tvbox" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=123456" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=123456" >> gradle.properties

          # 授予执行权限
          chmod +x gradlew

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 开始编译Release包（无任何修改）
        working-directory: tvbox-src
        run: |
          ./gradlew clean assembleRelease --no-build-cache

      - name: 整理APK
        run: |
          mkdir -p output
          find ./tvbox-src -name "*release*.apk" -exec mv {} ./output/ \;

      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox极简版APK
          path: output/
          retention-days: 30
