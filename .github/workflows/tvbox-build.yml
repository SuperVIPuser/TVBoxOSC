name: TVBox编译构建

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - user: takagen99
            name: Box
            branch: main
            jdk: 11

    steps:
      - name: 拉取本仓库代码
        uses: actions/checkout@v4

      - name: 拉取TVBox源码
        run: |
          git clone --depth 1 -b ${{ matrix.repo.branch }} https://github.com/${{ matrix.repo.user }}/${{ matrix.repo.name }} tvbox-src

      - name: 修复构建配置（核心步骤）
        working-directory: tvbox-src
        run: |
          # 1. 创建local.properties，解决文件缺失问题
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

          # 2. 彻底删除所有阿里云镜像配置
          sed -i '/maven.*aliyun/d' build.gradle
          sed -i '/maven.*aliyun/d' app/build.gradle

          # 3. 给JitPack配置匿名认证，解决401问题
          sed -i 's|url "https://jitpack.io"|url "https://jitpack.io" credentials { username "github" password "" }|g' build.gradle

          # 4. 配置通用签名
          echo "RELEASE_STORE_FILE=tvbox.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=tvbox" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=123456" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=123456" >> gradle.properties

          # 5. 授予执行权限
          chmod +x gradlew

      - name: 配置JDK环境（改用兼容的JDK11）
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.repo.jdk }}
          distribution: temurin

      - name: 开始编译Release包
        working-directory: tvbox-src
        run: |
          ./gradlew clean assembleRelease --no-build-cache --stacktrace --info

      - name: 整理编译好的APK
        run: |
          mkdir -p output
          find ./tvbox-src -name "*release*.apk" -exec mv {} ./output/ \;

      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox成品APK-${{ matrix.repo.name }}
          path: output/
          retention-days: 30
