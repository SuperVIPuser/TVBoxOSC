name: TVBox极简构建

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 构建TVBox
        run: |
          # 拉取源码
          git clone --depth 1 https://github.com/o0HalfLife0o/TVBoxOSC tvbox-src
          cd tvbox-src

          # 创建配置文件
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "RELEASE_STORE_FILE=tvbox.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=tvbox" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=123456" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=123456" >> gradle.properties

          # 赋予执行权限
          chmod +x gradlew

          # 配置JDK并编译
          java -version
          ./gradlew clean assembleRelease --no-build-cache

          # 整理APK
          mkdir -p ../output
          find . -name "*release*.apk" -exec mv {} ../output/ \;

      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox成品APK
          path: output/
          retention-days: 30
